name: Monthly Dependency Audit

on:
  schedule:
    - cron: '0 3 1 * *' # Runs monthly on day 1 at 03:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate

      - name: Fail on vulnerabilities
        if: failure()
        run: |
          echo "Security vulnerabilities detected. Please review npm audit output."
          exit 1
